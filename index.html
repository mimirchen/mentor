<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>领路人 · The Mentor — DoubleMi</title>
<meta name="description" content="一位持续在场的精神领路人：为能力强于舞台的人保管命运叙事。私密内测中。">
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;1,500&family=Instrument+Sans:wght@400;500&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/mentor.css">
</head>
<body>
<div class="wrap">
  <nav>
    <a class="nav-mark" href="https://doublemi.ai">DoubleMi<span class="cn">另一个你</span></a>
    <div class="nav-right">
      <a href="gallery.html" data-i18n="nav_gallery"></a>
      <button class="lang-toggle" id="lang-toggle">EN</button>
      <a href="app.html" data-i18n="enter"></a>
    </div>
  </nav>

  <header class="hero">
    <div class="kicker">Product 001 · Private</div>
    <h1><span class="serif">The Mentor</span><span class="cn">领 路 人</span></h1>
    <p class="hero-tag" data-i18n="hero_tag"></p>
  </header>

  <section class="card" style="max-width:440px;margin:0 auto">
    <div class="sec-label" data-i18n="login_label"></div>
    <form id="login-form">
      <input class="field" type="email" id="email" data-i18n-ph="email_ph" required autocomplete="email">
      <button class="btn btn-amber" type="button" id="btn-waitlist" style="width:100%;margin-top:14px" data-i18n="wl_btn"></button>
      <button class="btn btn-ghost" type="submit" style="width:100%;margin-top:10px" data-i18n="send_link"></button>
    </form>
    <p class="note" style="margin-top:14px" data-i18n="private_note"></p>
    <p class="note hidden" id="wl-ok" style="color:var(--amber)" data-i18n="wl_ok"></p>
    <p class="note hidden" id="login-sent" style="color:var(--amber)" data-i18n="link_sent"></p>
  </section>

  <div class="hair-rule"></div>
  <footer><span data-i18n="footer"></span> · <a href="https://doublemi.ai">doublemi.ai</a></footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/config.js"></script>
<script src="assets/js/i18n.js"></script>
<script>
const C = window.MENTOR_CONFIG;
window.MENTOR_I18N.apply();
document.getElementById("lang-toggle").onclick = () => window.MENTOR_I18N.toggle();
const sb = supabase.createClient(C.SUPABASE_URL, C.SUPABASE_ANON_KEY);
sb.auth.getSession().then(({data}) => { if (data.session) location.href = "app.html"; });
document.getElementById("login-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const email = document.getElementById("email").value.trim();
  const { error } = await sb.auth.signInWithOtp({
    email, options: { emailRedirectTo: C.SITE_URL + "/app.html" }
  });
  if (error) { alert(error.message); return; }
  document.getElementById("wl-ok").classList.add("hidden");
  document.getElementById("login-sent").classList.remove("hidden");
});
document.getElementById("btn-waitlist").addEventListener("click", async () => {
  const email = document.getElementById("email").value.trim();
  if (!email || !email.includes("@")) { document.getElementById("email").focus(); return; }
  const { error } = await sb.from("waitlist").insert({
    email, locale: window.MENTOR_I18N.lang, source: "mentor"
  });
  if (error && error.code !== "23505") { alert(error.message); return; } // already queued: fine
  document.getElementById("login-sent").classList.add("hidden");
  document.getElementById("wl-ok").classList.remove("hidden");
});
</script>
</body>
</html>
