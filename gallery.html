<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>回音廊 · The Echo Gallery — 领路人</title>
<meta name="description" content="同路人愿意分给世界的一段路。The Echo Gallery of The Mentor.">
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;1,500&family=Instrument+Sans:wght@400;500&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/mentor.css">
</head>
<body>
<div class="wrap">
  <nav>
    <a class="nav-mark" href="index.html">The Mentor<span class="cn">领路人</span></a>
    <div class="nav-right">
      <a href="app.html" data-i18n="nav_home"></a>
      <button class="lang-toggle" id="lang-toggle">EN</button>
    </div>
  </nav>

  <header class="hero" style="padding:64px 0 36px">
    <div class="kicker">The Echo Gallery · 回音廊</div>
    <h1 style="font-size:clamp(30px,4.5vw,44px)"><span class="serif">Echoes</span><span class="cn">回 音 廊</span></h1>
    <p class="hero-tag" data-i18n="gal_sub"></p>
  </header>

  <!-- 分享入口（登录可见） -->
  <section class="card hidden" id="share-box" style="max-width:560px;margin:0 auto 32px">
    <div class="sec-label" data-i18n="gal_share_label"></div>
    <input class="field" id="pen-name" data-i18n-ph="gal_pen_ph" maxlength="24" style="margin-bottom:10px">
    <textarea class="field" id="share-text" rows="5" data-i18n-ph="gal_content_ph" maxlength="2000"></textarea>
    <button class="btn btn-amber" id="btn-share" style="margin-top:14px" data-i18n="gal_submit"></button>
  </section>
  <p class="note hidden" id="login-note" style="text-align:center;margin-bottom:32px">
    <a href="index.html" style="color:var(--muted)" data-i18n="gal_login_note"></a>
  </p>

  <!-- 我的回音（登录且有内容时可见） -->
  <section class="hidden" id="mine-sec" style="max-width:560px;margin:0 auto 32px">
    <div class="sec-label" data-i18n="gal_mine_label"></div>
    <div class="echo-grid" id="mine-grid" style="margin-top:12px"></div>
  </section>

  <!-- 公共回音廊 -->
  <section style="max-width:560px;margin:0 auto;padding-bottom:60px">
    <div class="echo-grid" id="echo-grid"></div>
    <p class="note" id="echo-empty" style="text-align:center;display:none;margin-top:20px" data-i18n="gal_empty"></p>
  </section>

  <div class="hair-rule"></div>
  <footer><span data-i18n="footer"></span> · <a href="https://doublemi.ai">doublemi.ai</a></footer>
</div>

<div class="toast hidden" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/config.js"></script>
<script src="assets/js/i18n.js"></script>
<script>
(async function () {
  const C = window.MENTOR_CONFIG, I = window.MENTOR_I18N;
  I.apply();
  document.getElementById("lang-toggle").onclick = () => I.toggle();

  const sb = supabase.createClient(C.SUPABASE_URL, C.SUPABASE_ANON_KEY);
  const { data: { session } } = await sb.auth.getSession();
  const user = session ? session.user : null;

  document.getElementById(user ? "share-box" : "login-note").classList.remove("hidden");

  /* one「同路」per visitor per echo */
  const ANON_KEY = "mentor_anon", LIT_KEY = "mentor_walked";
  let anon = localStorage.getItem(ANON_KEY);
  if (!anon) { anon = crypto.randomUUID ? crypto.randomUUID() : "a" + Date.now() + Math.floor(Math.random() * 1e6); localStorage.setItem(ANON_KEY, anon); }
  const visitorId = () => user ? user.id : anon;
  const walked = () => { try { return JSON.parse(localStorage.getItem(LIT_KEY)) || []; } catch (e) { return []; } };
  const markWalked = (id) => { const l = walked(); if (!l.includes(id)) { l.push(id); localStorage.setItem(LIT_KEY, JSON.stringify(l)); } };

  function toast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg; t.classList.remove("hidden");
    setTimeout(() => t.classList.add("hidden"), 3200);
  }

  function echoCard(row, counts) {
    const card = document.createElement("div");
    card.className = "echo-card";
    const text = document.createElement("p");
    text.className = "echo-text"; text.textContent = row.content;
    const foot = document.createElement("div");
    foot.className = "echo-foot";
    const pen = document.createElement("span");
    pen.className = "echo-pen"; pen.textContent = "— " + (row.pen_name || I.t("gal_anon"));
    foot.appendChild(pen);

    const lit = walked().includes(row.id);
    const n = counts[row.id] || 0;
    const btn = document.createElement("button");
    btn.className = "walk-btn" + (lit ? " lit" : "");
    btn.innerHTML = `<span>${lit ? I.t("gal_walked") : I.t("gal_walk")}</span><span>${n || ""}</span>`;
    btn.onclick = async () => {
      if (btn.classList.contains("lit")) return;
      btn.classList.add("lit");
      btn.innerHTML = `<span>${I.t("gal_walked")}</span><span>${n + 1}</span>`;
      markWalked(row.id);
      try { await sb.from("mentor_gallery_resonance").insert({ gallery_id: row.id, anon_id: visitorId() }); } catch (e) {}
    };
    foot.appendChild(btn);
    card.appendChild(text); card.appendChild(foot);
    return card;
  }

  function mineCard(row) {
    const card = document.createElement("div");
    card.className = "echo-card echo-mine";
    const text = document.createElement("p");
    text.className = "echo-text"; text.textContent = row.content;
    const foot = document.createElement("div");
    foot.className = "echo-foot";
    const st = document.createElement("span");
    st.className = "echo-status" + (row.approved ? " live" : "");
    st.textContent = I.t(row.approved ? "gal_live" : "gal_pending");
    const del = document.createElement("button");
    del.className = "linkish-danger"; del.textContent = I.t("gal_withdraw");
    del.onclick = async () => {
      await sb.from("mentor_gallery").delete().eq("id", row.id);
      render();
    };
    foot.appendChild(st); foot.appendChild(del);
    card.appendChild(text); card.appendChild(foot);
    return card;
  }

  async function render() {
    const grid = document.getElementById("echo-grid");
    grid.innerHTML = "";
    let rows = [];
    try {
      const { data } = await sb.from("mentor_gallery")
        .select("id,pen_name,content,created_at")
        .eq("approved", true).order("created_at", { ascending: false }).limit(60);
      rows = data || [];
    } catch (e) {}
    let counts = {};
    if (rows.length) {
      try {
        const { data } = await sb.from("mentor_gallery_resonance")
          .select("gallery_id").in("gallery_id", rows.map(r => r.id));
        (data || []).forEach(r => { counts[r.gallery_id] = (counts[r.gallery_id] || 0) + 1; });
      } catch (e) {}
    }
    document.getElementById("echo-empty").style.display = rows.length ? "none" : "block";
    rows.forEach(r => grid.appendChild(echoCard(r, counts)));

    if (user) {
      const { data: mine } = await sb.from("mentor_gallery")
        .select("id,content,approved,created_at")
        .eq("user_id", user.id).order("created_at", { ascending: false });
      const sec = document.getElementById("mine-sec"), mg = document.getElementById("mine-grid");
      mg.innerHTML = "";
      if (mine && mine.length) {
        sec.classList.remove("hidden");
        mine.forEach(r => mg.appendChild(mineCard(r)));
      } else sec.classList.add("hidden");
    }
  }

  document.getElementById("btn-share").onclick = async () => {
    const content = document.getElementById("share-text").value.trim();
    if (content.length < 20) { toast(I.t("gal_too_short")); return; }
    const pen = document.getElementById("pen-name").value.trim() || null;
    const { error } = await sb.from("mentor_gallery").insert({
      user_id: user.id, pen_name: pen, content, lang: I.lang
    });
    if (error) { toast(I.t("err_generic")); return; }
    document.getElementById("share-text").value = "";
    toast(I.t("gal_sent"));
    render();
  };

  await render();
  window.addEventListener("mentor:lang", () => { I.apply(); render(); });
})();
</script>
</body>
</html>
